# ── Danh sách servers cần monitor ─────────────────────────────────────────
# File này là TEMPLATE — copy sang servers.yml và điền IP thật
# Usage: cp targets/servers.example.yml targets/servers.yml
#
# File servers.yml bị ignore bởi .gitignore (chứa IP thật, không push GitHub)
#
# Cú pháp:
# - labels:
#     host: 'ten-server'       ← Hiển thị trong Grafana
#     env: 'production'        ← Tuỳ chọn: phân loại môi trường
#   targets:
#     - 'IP_hoac_hostname'     ← Chỉ IP/hostname, KHÔNG cần port
#
# ──────────────────────────────────────────────────────────────────────────

# Monitor Server (local — dùng Docker hostname, không cần đổi)
- labels:
    host: monitor-server
    env: production
  targets:
    - node-exporter

