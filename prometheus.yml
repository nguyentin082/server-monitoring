global:
    scrape_interval: 60s
    scrape_timeout: 30s
    evaluation_interval: 60s

scrape_configs:
    # ── Prometheus self-monitoring ────────────────────────────────────────────
    - job_name: prometheus
      static_configs:
          - targets: ['prometheus:9090']

    # ── Node Exporter — System metrics (CPU, RAM, Disk, Network) ─────────────
    # Danh sách servers được quản lý trong targets/servers.yml
    # Thêm server mới: chỉ cần sửa targets/servers.yml, không động vào file này
    - job_name: node
      file_sd_configs:
          - files: ['/etc/prometheus/targets/servers.yml']
            refresh_interval: 30s
      relabel_configs:
          # Gắn port 9100 vào địa chỉ từ targets/servers.yml
          - source_labels: [__address__]
            regex: '(.*)'
            replacement: '$1:9100'
            target_label: __address__
          # Ghi đè label instance bằng "Tên server - IP:Port"
          - source_labels: [name, __address__]
            separator: ' - '
            target_label: instance
